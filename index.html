<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Web</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>

  <header class="navbar">
    <div class="navbar__inner">

      <!-- Left: logo circle + label -->
      <div class="navbar__brand">
        <div class="navbar__logo">
          <i class="fa-solid fa-cart-shopping"></i>
        </div>
        <span class="navbar__name">LOGO</span>
      </div>

      <!-- Center: site name -->
      <span class="navbar__title">Test Web</span>

      <!-- Right: nav links -->
      <nav class="navbar__links">
        <a href="#" class="navbar__link">Home</a>
        <a href="#" class="navbar__link">About</a>
        <a href="#" class="navbar__link">Contact</a>
      </nav>

      <!-- Mobile hamburger -->
      <button class="navbar__burger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

    </div>

    <!-- Mobile dropdown -->
    <nav class="navbar__mobile" hidden>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main class="main">

    <div class="content-block">
      <div class="content-block__row content-block__row--title">
        <h1>Tiêu đề 1</h1>
      </div>
      <div class="content-block__row content-block__row--body">
        <p>Đây là block 1</p>
      </div>
    </div>

    <div class="content-block">
      <div class="content-block__row content-block__row--title">
        <h1>Tiêu đề 2</h1>
      </div>
      <div class="content-block__row content-block__row--body">
        <p>Đây là block 2</p>
      </div>
    </div>

  </main>

</body>
</html>
